name: Release

# Publishes to npm on every push/merge to main — but only when the version in
# package.json is not already on the registry. Ordinary commits (docs, refactors)
# are a clean no-op; to cut a release, bump "version" in package.json and merge.
#
# Prerequisites (one-time):
#   1. The @tierone org must exist on npmjs.com.
#   2. Add an npm token as the repo secret NPM_TOKEN
#      (npmjs.com → Access Tokens → Granular, scoped to this package + publish).

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - run: npm test
      - name: Check npm token
        id: npm-token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish if version is new
        if: steps.npm-token.outputs.has_token == 'true'
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "▲ $NAME@$VERSION is already published — skipping."
          else
            echo "▲ Publishing $NAME@$VERSION ..."
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
